<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>受講生一覧</title>
</head>
<body>
<h1>受講生一覧</h1>
<table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>名前</th>
      <th>カナ名</th>
      <th>ニックネーム</th>
      <th>メールアドレス</th>
      <th>地域</th>
      <th>年齢</th>
      <th>性別</th>
      <th>備考</th>
    </tr>
  </thead>
  <tbody>
  <tr th:each="studentDetail : ${studentList}">
    <td th:text="${studentDetail.student.id}">ada1f007-7942-11f1-b4d0-b81ea42bf144</td>
    <td th:text="${studentDetail.student.name}">山田 太郎</td>
    <td th:text="${studentDetail.student.kanaName}">ヤマダ タロウ</td>
    <td th:text="${studentDetail.student.nickname}">たろう</td>
    <td th:text="${studentDetail.student.email}">yamada@example.com</td>
    <td th:text="${studentDetail.student.area}">東京都</td>
    <td th:text="${studentDetail.student.age}">35</td>
    <td th:text="${studentDetail.student.sex}">男性</td>
    <td th:text="${studentDetail.student.remark}">なし</td>
  </tr>
  </tbody>
</table>
</body>
</html>
