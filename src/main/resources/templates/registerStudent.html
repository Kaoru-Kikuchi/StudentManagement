<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>受講生登録</title>
</head>
<body>

<h1>受講生登録</h1>

<form th:action="@{/registerStudent}"
      th:object="${studentDetail}"
      method="post">

  <div>
    <label for="name">名前：</label>
    <input type="text"
           id="name"
           th:field="*{student.name}"
           required>
  </div>

  <div>
    <label for="kanaName">カナ名：</label>
    <input type="text"
           id="kanaName"
           th:field="*{student.kanaName}">
  </div>

  <div>
    <label for="nickname">ニックネーム：</label>
    <input type="text"
           id="nickname"
           th:field="*{student.nickname}">
  </div>

  <div>
    <label for="email">メールアドレス：</label>
    <input type="email"
           id="email"
           th:field="*{student.email}">
  </div>

  <div>
    <label for="area">地域：</label>
    <input type="text"
           id="area"
           th:field="*{student.area}">
  </div>

  <div>
    <label for="age">年齢：</label>
    <input type="number"
           id="age"
           th:field="*{student.age}">
  </div>

  <div>
    <label for="sex">性別：</label>
    <input type="text"
           id="sex"
           th:field="*{student.sex}">
  </div>

  <div>
    <label for="remark">備考：</label>
    <input type="text"
           id="remark"
           th:field="*{student.remark}">
  </div>

  <!-- 受講コース（1件目） -->
  <div>
    <label for="courseName">受講コース名：</label>
    <input type="text"
           id="courseName"
           th:field="*{studentCourses[0].courseName}">
  </div>

  <div>
    <label for="courseStartAt">受講開始日：</label>
    <input type="datetime-local"
           id="courseStartAt"
           th:field="*{studentCourses[0].courseStartAt}">
  </div>

  <div>
    <label for="courseEndAt">受講終了日：</label>
    <input type="datetime-local"
           id="courseEndAt"
           th:field="*{studentCourses[0].courseEndAt}">
  </div>

  <div>
    <button type="submit">登録</button>
  </div>

</form>

</body>
</html>
