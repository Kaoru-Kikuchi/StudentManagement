<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>受講生詳細</title>
</head>
<body>

<h1>受講生詳細</h1>

<form th:action="@{/updateStudent}"
      th:object="${studentDetail}"
      method="post">

  <!-- 表示用ID -->
  <div>
    <label>ID：</label>
    <span th:text="*{student.id}"></span>
  </div>

  <!-- 更新時に送信するID -->
  <input type="hidden" th:field="*{student.id}">

  <div>
    <label for="name">名前：</label>
    <input type="text"
           id="name"
           th:field="*{student.name}"
           required>
  </div>

  <div>
    <label for="kanaName">カナ名：</label>
    <input type="text"
           id="kanaName"
           th:field="*{student.kanaName}">
  </div>

  <div>
    <label for="nickname">ニックネーム：</label>
    <input type="text"
           id="nickname"
           th:field="*{student.nickname}">
  </div>

  <div>
    <label for="email">メールアドレス：</label>
    <input type="email"
           id="email"
           th:field="*{student.email}">
  </div>

  <div>
    <label for="area">地域：</label>
    <input type="text"
           id="area"
           th:field="*{student.area}">
  </div>

  <div>
    <label for="age">年齢：</label>
    <input type="number"
           id="age"
           th:field="*{student.age}">
  </div>

  <div>
    <label for="sex">性別：</label>
    <input type="text"
           id="sex"
           th:field="*{student.sex}">
  </div>

  <div>
    <label for="remark">備考：</label>
    <input type="text"
           id="remark"
           th:field="*{student.remark}">
  </div>

  <div>
    <label for="deleted">キャンセル：</label>
    <input type="checkbox"
           id="deleted"
           th:field="*{student.deleted}">
  </div>

  <h2>受講コース</h2>

  <div th:each="studentCourse, stat : *{studentCourses}">
    <input type="hidden"
           th:field="*{studentCourses[__${stat.index}__].id}">

    <input type="hidden"
           th:field="*{studentCourses[__${stat.index}__].studentId}">

    <label th:for="${'courseName' + stat.index}">
      受講コース名：
    </label>

    <input type="text"
           th:id="${'courseName' + stat.index}"
           th:field="*{studentCourses[__${stat.index}__].courseName}">
  </div>

  <div>
    <button type="submit">更新</button>
  </div>

</form>

</body>
</html>
